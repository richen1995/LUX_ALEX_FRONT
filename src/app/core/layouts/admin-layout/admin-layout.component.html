<div class="min-h-screen bg-brand-dark text-brand-gray-light flex">
  
  <!-- Sidebar Panel -->
  <aside 
    [ngClass]="{ 'translate-x-0': isMobileOpen(), '-translate-x-full': !isMobileOpen() }"
    class="fixed md:static inset-y-0 left-0 w-64 glass-panel border-r border-white/5 z-30 transition-transform duration-300 md:translate-x-0 flex flex-col flex-shrink-0"
  >
    <!-- Logo and Brand -->
    <div class="h-20 border-b border-white/5 flex items-center px-6 gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-blue to-brand-accent flex items-center justify-center text-sm font-black">
        <span>🛡️</span>
      </div>
      <div class="flex flex-col">
        <span class="text-white font-extrabold text-sm tracking-wider leading-none">SECUREPRO</span>
        <span class="text-brand-blue font-bold text-[9px] tracking-widest uppercase">Admin Panel</span>
      </div>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
      <a 
        routerLink="/admin/dashboard" 
        routerLinkActive="text-brand-blue bg-white/5 border-l-2 border-brand-blue" 
        (click)="closeMobileMenu()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-white/5 transition-colors"
      >
        <span>📊</span> Dashboard
      </a>
      
      <a 
        routerLink="/admin/crm" 
        routerLinkActive="text-brand-blue bg-white/5 border-l-2 border-brand-blue" 
        (click)="closeMobileMenu()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-white/5 transition-colors"
      >
        <span>👥</span> CRM (Leads)
      </a>

      <a 
        routerLink="/admin/products" 
        routerLinkActive="text-brand-blue bg-white/5 border-l-2 border-brand-blue" 
        (click)="closeMobileMenu()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-white/5 transition-colors"
      >
        <span>🛒</span> Gestión Productos
      </a>

      <a 
        routerLink="/admin/services" 
        routerLinkActive="text-brand-blue bg-white/5 border-l-2 border-brand-blue" 
        (click)="closeMobileMenu()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-white/5 transition-colors"
      >
        <span>🛠️</span> Gestión Servicios
      </a>

      <a 
        routerLink="/admin/projects" 
        routerLinkActive="text-brand-blue bg-white/5 border-l-2 border-brand-blue" 
        (click)="closeMobileMenu()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-white/5 transition-colors"
      >
        <span>🖼️</span> Galería Proyectos
      </a>

      <a 
        routerLink="/admin/testimonials" 
        routerLinkActive="text-brand-blue bg-white/5 border-l-2 border-brand-blue" 
        (click)="closeMobileMenu()"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-white/5 transition-colors"
      >
        <span>💬</span> Testimonios
      </a>
    </nav>

    <!-- Sidebar Footer (User Info & Logout) -->
    <div class="p-4 border-t border-white/5 bg-brand-surface/40">
      <div class="flex items-center gap-3 mb-3 px-2">
        <div class="w-9 h-9 rounded-full bg-brand-blue/10 flex items-center justify-center text-xs font-bold text-brand-blue border border-brand-blue/20">
          👤
        </div>
        <div class="min-w-0">
          <p class="text-xs font-bold truncate text-white leading-none">{{ username() }}</p>
          <span class="text-[9px] text-brand-gray-muted uppercase tracking-wider">{{ userRole() }}</span>
        </div>
      </div>
      <button 
        (click)="onLogout()"
        class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-rose-500/20 hover:bg-rose-500/10 text-rose-400 text-xs font-bold transition-colors"
      >
        Cerrar Sesión 🚪
      </button>
    </div>
  </aside>

  <!-- Overlay for Mobile Sidebar -->
  @if (isMobileOpen()) {
    <div 
      (click)="closeMobileMenu()" 
      class="fixed inset-0 bg-brand-dark/60 backdrop-blur-sm z-20 md:hidden"
    ></div>
  }

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- Header -->
    <header class="h-20 bg-brand-surface border-b border-white/5 flex items-center justify-between px-6 z-10">
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Toggle -->
        <button 
          (click)="toggleMobileMenu()" 
          class="md:hidden p-2 rounded-xl hover:bg-white/5 transition-colors text-white"
        >
          ☰
        </button>
        <h1 class="text-lg font-bold text-white font-sans">Panel de Control General</h1>
      </div>

      <div class="flex items-center gap-4">
        <a 
          routerLink="/" 
          class="hidden sm:inline-flex items-center gap-1.5 text-xs font-bold text-brand-blue hover:text-white px-3 py-1.5 rounded-lg border border-brand-blue/20 hover:bg-brand-blue/10 transition-all"
        >
          🌐 Ver Web Pública
        </a>
      </div>
    </header>

    <!-- Route Outlet Container -->
    <main class="flex-1 overflow-y-auto p-6 md:p-8 bg-[#080B15]">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

</div>
